<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>InsureSmart</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<div class="container">

<h1>🛡️ InsureSmart</h1>

<h3>AI Powered Insurance Recommendation System</h3>

<form action="/predict" method="POST">

<label>Name</label>

<input type="text" name="name" required>

<label>Age</label>

<input type="number" name="age" min="18" max="100" required>

<label>Gender</label>

<select name="gender">

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

<label>Annual Income (₹)</label>

<input type="number" name="income" required>

<label>BMI</label>

<input type="number"
step="0.1"
name="bmi"
required>

<label>Smoker</label>

<select name="smoker">

<option>No</option>

<option>Yes</option>

</select>

<label>Diabetes</label>

<select name="diabetes">

<option>No</option>

<option>Yes</option>

</select>

<label>Blood Pressure</label>

<select name="blood_pressure">

<option>Normal</option>

<option>High</option>

</select>

<label>Insurance Type</label>

<select name="insurance_type">

<option>Health</option>

<option>Life</option>

<option>Vehicle</option>

<option>Travel</option>

</select>

<button type="submit">

Generate Recommendation

</button>

</form>

<br>

<a href="/history">

View Recommendation History

</a>

</div>

</body>
</html>
